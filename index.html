<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infraestructura IT 3D</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        overflow: hidden;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #020617;
        color: white;
      }

      #floorMenu {
  position: absolute;
  width: 100%;
  height: 100vh;

  display: grid;
grid-template-columns: 1fr;  /* ← Una sola columna */
  grid-template-rows: repeat(5, 1fr);  /* ← 5 filas */

  gap: 20px;

  padding: 25px;

  background: radial-gradient(circle at top, #1e293b, #020617);

  z-index: 10;
}

      .floorCard {
        background: rgba(15, 23, 42, 0.75);
        border: 1px solid rgba(59, 130, 246, 0.3);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2rem;
        font-weight: bold;
        cursor: pointer;
        transition: all 0.3s ease;
        backdrop-filter: blur(10px);
        position: relative;
        overflow: hidden;
      }

      .floorCard::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(59, 130, 246, 0.3), transparent);
        transition: left 0.5s ease;
      }

      .floorCard:hover::before {
        left: 100%;
      }

      .floorCard:hover {
        transform: scale(1.05);
        background: rgba(30, 41, 59, 0.95);
        box-shadow: 0 0 40px rgba(59, 130, 246, 0.4);
        border-color: rgba(59, 130, 246, 0.6);
      }

      #doorScene {
        position: absolute;
        width: 100%;
        height: 100vh;
        display: none;
        background: linear-gradient(to bottom, #0f172a, #020617);
        z-index: 9;
      }

      #backButton {
        position: absolute;
        top: 20px;
        left: 20px;
        padding: 12px 20px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        background: rgba(15, 23, 42, 0.9);
        color: white;
        cursor: pointer;
        z-index: 100;
        transition: all 0.3s ease;
        font-weight: 600;
      }

      #backButton:hover {
        background: rgba(30, 41, 59, 0.95);
        border-color: rgba(59, 130, 246, 0.6);
        box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
      }

      #doorsContainer {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 60px;
        perspective: 1000px;
        flex-wrap: wrap;
        overflow-y: auto;
        padding: 40px;
      }

      .doorWrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        transform-style: preserve-3d;
      }

      .door {
        width: 180px;
        height: 320px;
        background: linear-gradient(135deg, #4a3728, #6b4423);
        border: 6px solid #1e1b18;
        border-radius: 6px;
        position: relative;
        transform-origin: left center;
        transition: transform 1s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        cursor: pointer;
        box-shadow:
          inset -10px 0 20px rgba(0, 0, 0, 0.4),
          0 10px 40px rgba(0, 0, 0, 0.6),
          inset 0 0 30px rgba(255, 255, 255, 0.05);
      }

      .door::after {
        content: "";
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #ffd700, #b8860b);
        position: absolute;
        right: 15px;
        top: 50%;
        box-shadow: 0 2px 8px rgba(255, 215, 0, 0.4);
      }

      .door.open {
        transform: perspective(1200px) rotateY(-105deg);
      }

      .doorLabel {
        margin-top: 20px;
        font-size: 1.3rem;
        font-weight: 600;
        color: #cbd5e1;
        letter-spacing: 0.5px;
      }

      #rackView {
        position: absolute;
        width: 100%;
        height: 100vh;
        display: none;
        z-index: 1;
      }

      #infoPanel {
        position: absolute;
        top: 20px;
        right: 20px;
        width: 380px;
        background: rgba(15, 23, 42, 0.98);
        padding: 28px;
        border-radius: 18px;
        border: 1px solid rgba(59, 130, 246, 0.3);
        z-index: 20;
        display: none;
        backdrop-filter: blur(15px);
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7);
        transition: all 0.3s ease;
        max-height: 90vh;
        overflow-y: auto;
        animation: slideIn 0.3s ease;
      }

      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateX(30px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      #infoPanel::-webkit-scrollbar {
        width: 6px;
      }

      #infoPanel::-webkit-scrollbar-track {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 10px;
      }

      #infoPanel::-webkit-scrollbar-thumb {
        background: rgba(59, 130, 246, 0.5);
        border-radius: 10px;
      }

      #infoPanel::-webkit-scrollbar-thumb:hover {
        background: rgba(59, 130, 246, 0.7);
      }

      #closeInfo {
        position: absolute;
        top: 12px;
        right: 12px;
        width: 36px;
        height: 36px;
        border: none;
        border-radius: 50%;
        background: rgba(59, 130, 246, 0.1);
        color: white;
        cursor: pointer;
        font-size: 1.2rem;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #closeInfo:hover {
        background: rgba(239, 68, 68, 0.8);
        transform: scale(1.15) rotate(90deg);
      }

      .infoTitle {
        font-size: 1.6rem;
        font-weight: 700;
        margin-bottom: 24px;
        background: linear-gradient(135deg, #3b82f6, #60a5fa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .infoSection {
        margin-bottom: 20px;
        padding: 16px;
        border-radius: 14px;
        background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.6));
        border: 1px solid rgba(59, 130, 246, 0.2);
        transition: all 0.3s ease;
      }

      .infoSection:hover {
        background: linear-gradient(135deg, rgba(30, 41, 59, 1), rgba(15, 23, 42, 0.8));
        border-color: rgba(59, 130, 246, 0.5);
      }

      .infoLabel {
        color: #94a3b8;
        font-size: 0.85rem;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-weight: 600;
      }

      .infoValue {
        font-size: 1.1rem;
        font-weight: 700;
        color: #f1f5f9;
        word-break: break-word;
      }

      .badge {
        display: inline-block;
        padding: 8px 16px;
        border-radius: 999px;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.5px;
        transition: all 0.3s ease;
      }

      .badge.core {
        background: linear-gradient(135deg, #7f1d1d, #991b1b);
        color: #fecaca;
        box-shadow: 0 0 15px rgba(127, 29, 29, 0.5);
      }

      .badge.distribution {
        background: linear-gradient(135deg, #7c2d12, #9a3412);
        color: #fdba74;
        box-shadow: 0 0 15px rgba(124, 45, 18, 0.5);
      }

      .badge.access {
        background: linear-gradient(135deg, #14532d, #166534);
        color: #86efac;
        box-shadow: 0 0 15px rgba(20, 83, 45, 0.5);
      }

      .badge:hover {
        transform: scale(1.1);
        box-shadow: 0 0 25px currentColor;
      }

      .statusIndicator {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-right: 8px;
        animation: pulse 2s infinite;
      }

      .statusIndicator.online {
        background: #22c55e;
        box-shadow: 0 0 10px #22c55e;
      }

      .statusIndicator.offline {
        background: #ef4444;
        box-shadow: 0 0 10px #ef4444;
      }

      @keyframes pulse {
        0% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
        100% {
          opacity: 1;
        }
      }

      #rackBackButton {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 50;
        padding: 12px 20px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 12px;
        background: rgba(15, 23, 42, 0.95);
        color: white;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.3s ease;
        font-weight: 600;
      }

      #rackBackButton:hover {
        background: rgba(30, 41, 59, 0.95);
        border-color: rgba(59, 130, 246, 0.6);
        box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
      }

      #titleBar {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(15, 23, 42, 0.95);
        padding: 18px 40px;
        border-radius: 16px;
        font-size: 1.5rem;
        font-weight: 700;
        z-index: 20;
        border: 1px solid rgba(59, 130, 246, 0.3);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        letter-spacing: 0.5px;
      }

      #hintBox {
        position: absolute;
        top: 100px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(15, 23, 42, 0.95);
        padding: 14px 24px;
        border-radius: 14px;
        color: #cbd5e1;
        font-size: 0.95rem;
        z-index: 20;
        border: 1px solid rgba(59, 130, 246, 0.3);
        animation: fadeInDown 0.5s ease;
      }

      @keyframes fadeInDown {
        from {
          opacity: 0;
          transform: translate(-50%, -20px);
        }
        to {
          opacity: 1;
          transform: translate(-50%, 0);
        }
      }

      #viewToggle {
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 50;
        display: flex;
        gap: 8px;
        background: rgba(15, 23, 42, 0.95);
        padding: 8px;
        border-radius: 12px;
        border: 1px solid rgba(59, 130, 246, 0.3);
      }

      .viewButton {
        padding: 8px 16px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        background: rgba(30, 41, 59, 0.5);
        color: #cbd5e1;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 0.9rem;
      }

      .viewButton.active {
        background: rgba(59, 130, 246, 0.8);
        color: white;
        border-color: rgba(59, 130, 246, 0.6);
      }

      .viewButton:hover {
        background: rgba(59, 130, 246, 0.5);
      }

      #cableToggle {
        position: absolute;
        top: 20px;
        right: 250px;
        z-index: 50;
        display: flex;
        gap: 8px;
        background: rgba(15, 23, 42, 0.95);
        padding: 8px;
        border-radius: 12px;
        border: 1px solid rgba(59, 130, 246, 0.3);
      }

      .cableButton {
        padding: 8px 16px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 8px;
        background: rgba(30, 41, 59, 0.5);
        color: #cbd5e1;
        cursor: pointer;
        transition: all 0.3s ease;
        font-size: 0.9rem;
      }

      .cableButton.active {
        background: rgba(168, 85, 247, 0.8);
        color: white;
        border-color: rgba(168, 85, 247, 0.6);
      }

      .cableButton:hover {
        background: rgba(168, 85, 247, 0.5);
      }

      #stats {
        position: absolute;
        bottom: 20px;
        left: 20px;
        background: rgba(15, 23, 42, 0.95);
        padding: 16px 24px;
        border-radius: 14px;
        border: 1px solid rgba(59, 130, 246, 0.3);
        font-size: 0.9rem;
        color: #cbd5e1;
        z-index: 20;
      }

      .stat-item {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 4px 0;
      }

      .stat-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }

      #loadingSpinner {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 100;
        display: none;
      }

      .spinner {
        border: 4px solid rgba(59, 130, 246, 0.3);
        border-top: 4px solid #3b82f6;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="loadingSpinner">
      <div class="spinner"></div>
    </div>

    <div id="floorMenu"></div>

    <div id="doorScene">
      <button id="backButton" onclick="goBack()">← Volver</button>

      <div id="titleBar"></div>

      <div id="hintBox">
        🖱️ Click en servidores, switches o cables para ver información
      </div>

      <div id="doorsContainer"></div>
    </div>

    <div id="rackView">
      <button id="rackBackButton">← Volver</button>

      <div id="cableToggle">
        <button class="cableButton active" onclick="toggleCables(true)">
          🔌 Con Cables
        </button>
        <button class="cableButton" onclick="toggleCables(false)">
          ⚡ Sin Cables
        </button>
      </div>

      <div id="viewToggle">
        <button class="viewButton active" onclick="setViewMode('orbit')">
          🎯 Órbita
        </button>
        <button class="viewButton" onclick="setViewMode('front')">
          📐 Frontal
        </button>
      </div>

      <div id="stats"></div>
    </div>

    <div id="infoPanel">
      <button id="closeInfo">✕</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
      // ==================== API CONFIGURATION ====================
      
      const API_URL = 'http://localhost:3000/api';
      
      // Estructura temporal (fallback si la API no funciona)
      let buildingFloors = {
        "PB": {
          rooms: ["Sala PB-1", "Sala PB-2", "Sala PB-3"],
          racksPerRoom: 2,
        },
        "ENTREPISO": {
          rooms: ["Sala Entrepiso"],
          racksPerRoom: 2,
        },
        "1ER PISO": {
          rooms: ["Sala 1A", "Sala 1B"],
          racksPerRoom: 2,
        },
        "2DO PISO": {
          rooms: ["Sala 2A"],
          racksPerRoom: 2,
        },
        "3ER PISO": {
          rooms: ["Data Center Principal"],
          racksPerRoom: 4,
        },
      };

      // Store para datos de la API
      let apiData = {
        pisos: [],
        salas: {},
        racks: {},
        dispositivos: {}
      };

      // Cargar datos desde la base de datos
      async function loadBuildingData() {
        try {
          console.log('🔄 Cargando datos desde la API...');
          
          // Obtener todos los pisos
          const pisosResponse = await fetch(`${API_URL}/pisos`);
          if (!pisosResponse.ok) throw new Error('Error al obtener pisos');
          
          const pisos = await pisosResponse.json();
          console.log('✅ Pisos cargados:', pisos);
          
          // Construir buildingFloors desde la API
          buildingFloors = {};
          
          for (const piso of pisos) {
            try {
              const salasResponse = await fetch(`${API_URL}/salas/${piso.id}`);
              if (!salasResponse.ok) throw new Error(`Error al obtener salas del piso ${piso.id}`);
              
              const salas = await salasResponse.json();
              console.log(`✅ Salas del piso ${piso.nombre}:`, salas);
              
              buildingFloors[piso.nombre] = {
                rooms: salas.map(s => s.nombre),
                racksPerRoom: salas[0]?.racksPerRoom || 2,
                pisoId: piso.id
              };
              
              // Almacenar salas para referencia
              apiData.salas[piso.id] = salas;
              
            } catch (error) {
              console.error(`❌ Error cargando salas del piso ${piso.id}:`, error);
            }
          }
          
          console.log('✅ Datos cargados exitosamente');
          renderFloorMenu();
          
        } catch (error) {
          console.error('❌ Error cargando datos desde la API:', error);
          console.log('⚠️ Usando datos por defecto...');
          renderFloorMenu();
        }
      }

      // ==================== DOM ELEMENTS ====================

      const floorMenu = document.getElementById("floorMenu");
      const doorScene = document.getElementById("doorScene");
      const doorsContainer = document.getElementById("doorsContainer");
      const rackView = document.getElementById("rackView");
      const infoPanel = document.getElementById("infoPanel");
      const titleBar = document.getElementById("titleBar");
      const statsPanel = document.getElementById("stats");
      const loadingSpinner = document.getElementById("loadingSpinner");

      let currentViewMode = "orbit";
      let showCables = true;

      // Renderizar menú de pisos
      function renderFloorMenu() {
        floorMenu.innerHTML = "";
        
        Object.keys(buildingFloors).forEach(floorName => {
          const floorData = buildingFloors[floorName];
          const emoji = floorData.emoji || "🏢";
          
          const card = document.createElement("div");
          card.className = "floorCard";
          card.innerHTML = `${emoji} ${floorName}`;
          card.onclick = () => openFloor(floorName);
          
          floorMenu.appendChild(card);
        });
      }

      function openFloor(floorName) {
        floorMenu.style.display = "none";
        doorScene.style.display = "block";
        titleBar.innerHTML = floorName;
        doorsContainer.innerHTML = "";

        const floorData = buildingFloors[floorName];

        floorData.rooms.forEach((room) => {
          const wrapper = document.createElement("div");
          wrapper.className = "doorWrapper";

          const door = document.createElement("div");
          door.className = "door";

          const label = document.createElement("div");
          label.className = "doorLabel";
          label.innerHTML = room;

          door.onclick = () => {
            door.classList.add("open");

            setTimeout(() => {
              loadRackScene(room, floorData.racksPerRoom);
            }, 900);
          };

          wrapper.appendChild(door);
          wrapper.appendChild(label);

          doorsContainer.appendChild(wrapper);
        });
      }

      function goBack() {
        rackView.style.display = "none";
        doorScene.style.display = "none";
        floorMenu.style.display = "grid";

        if (renderer) {
          renderer.dispose();
          renderer.domElement.remove();
        }
      }

      // =========================
      // THREE JS
      // =========================

      let scene;
      let camera;
      let renderer;
      let controls;
      let raycaster;
      let mouse;
      let hoveredObject = null;
      let rackGroup;
      let devices = [];
      let cableConnections = [];

      function setViewMode(mode) {
        currentViewMode = mode;

        if (mode === "front") {
          camera.position.set(0, 2, 8);
        } else {
          camera.position.set(5, 4, 10);
        }

        document.querySelectorAll(".viewButton").forEach((btn) => {
          btn.classList.remove("active");
        });
        event.target.classList.add("active");
      }

      function toggleCables(show) {
        showCables = show;

        document.querySelectorAll(".cableButton").forEach((btn) => {
          btn.classList.remove("active");
        });
        event.target.classList.add("active");

        cableConnections.forEach((cable) => {
          cable.visible = show;
        });
      }

      function updateStats() {
        const onlineServers = devices.filter(
          (d) => d.userData.type === "Servidor" && d.userData.status === "Online",
        ).length;
        const totalServers = devices.filter(
          (d) => d.userData.type === "Servidor",
        ).length;
        const switches = devices.filter(
          (d) => d.userData.type === "Switch",
        ).length;
        const patches = devices.filter(
          (d) => d.userData.type === "Patch Panel",
        ).length;
        const cables = cableConnections.length;

        statsPanel.innerHTML = `
          <div class="stat-item">
            <span class="stat-dot" style="background: #22c55e;"></span>
            Servidores: ${onlineServers}/${totalServers} online
          </div>
          <div class="stat-item">
            <span class="stat-dot" style="background: #3b82f6;"></span>
            Switches: ${switches}
          </div>
          <div class="stat-item">
            <span class="stat-dot" style="background: #f59e0b;"></span>
            Patch Panels: ${patches}
          </div>
          <div class="stat-item">
            <span class="stat-dot" style="background: #a78bfa;"></span>
            Cables: ${cables}
          </div>
        `;
      }

      function createCableTube(startPoint, endPoint, color, cableName) {
        const curve = new THREE.CatmullRomCurve3([
          startPoint,
          new THREE.Vector3(
            (startPoint.x + endPoint.x) / 2,
            (startPoint.y + endPoint.y) / 2 + 0.35,
            (startPoint.z + endPoint.z) / 2 - 0.2,
          ),
          new THREE.Vector3(
            (startPoint.x + endPoint.x) / 2,
            (startPoint.y + endPoint.y) / 2 + 0.35,
            (startPoint.z + endPoint.z) / 2 + 0.2,
          ),
          endPoint,
        ]);

        const geometry = new THREE.TubeGeometry(curve, 20, 0.04, 8, false);

        const material = new THREE.MeshStandardMaterial({
          color: color,
          metalness: 0.3,
          roughness: 0.7,
        });

        const cable = new THREE.Mesh(geometry, material);
        cable.castShadow = true;
        cable.receiveShadow = true;
        cable.visible = showCables;

        cable.userData = {
          type: "Cable",
          name: cableName,
          color: `0x${color.toString(16).padStart(6, "0")}`,
        };

        cableConnections.push(cable);
        scene.add(cable);

        return cable;
      }

      function loadRackScene(roomName, rackCount) {
        loadingSpinner.style.display = "block";

        setTimeout(() => {
          document.getElementById("rackBackButton").onclick = () => {
            rackView.style.display = "none";
            doorScene.style.display = "block";
            if (renderer) {
              renderer.dispose();
              renderer.domElement.remove();
            }
          };
        }, 100);

        doorScene.style.display = "none";
        rackView.style.display = "block";

        if (renderer) {
          renderer.dispose();
          renderer.domElement.remove();
        }

        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020617);
        scene.fog = new THREE.Fog(0x020617, 10, 35);

        camera = new THREE.PerspectiveCamera(
          75,
          window.innerWidth / window.innerHeight,
          0.1,
          1000,
        );

        camera.position.set(5, 4, 10);

        renderer = new THREE.WebGLRenderer({
          antialias: true,
          alpha: true,
        });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFShadowShadowMap;

        rackView.appendChild(renderer.domElement);

        controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.autoRotate = false;
        controls.maxDistance = 25;
        controls.minDistance = 3;

        // LIGHTS

        const mainLight = new THREE.PointLight(0xffffff, 0.8);
        mainLight.position.set(15, 12, 15);
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        mainLight.castShadow = true;
        scene.add(mainLight);

        const fillLight = new THREE.PointLight(0x6ba3ff, 0.4);
        fillLight.position.set(-15, 8, -10);
        scene.add(fillLight);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        // FLOOR

        const floor = new THREE.Mesh(
          new THREE.PlaneGeometry(30, 30),
          new THREE.MeshStandardMaterial({
            color: 0x111827,
            metalness: 0.8,
            roughness: 0.4,
          }),
        );

        floor.rotation.x = -Math.PI / 2;
        floor.position.y = -4;
        floor.receiveShadow = true;
        scene.add(floor);

        // LED FLOOR LIGHTS

        const createLedStrip = (x, y, z, width, height, depth) => {
          const led = new THREE.Mesh(
            new THREE.BoxGeometry(width, height, depth),
            new THREE.MeshBasicMaterial({
              color: 0x3b82f6,
            }),
          );

          led.position.set(x, y, z);
          scene.add(led);
        };

        createLedStrip(0, -3.98, 15, 30, 0.05, 0.1);
        createLedStrip(0, -3.98, -15, 30, 0.05, 0.1);
        createLedStrip(-15, -3.98, 0, 0.1, 0.05, 30);
        createLedStrip(15, -3.98, 0, 0.1, 0.05, 30);

        // RACKS

        devices = [];
        cableConnections = [];
        const rackPositions = {
          1: [0],
          2: [-3, 3],
          3: [-6, 0, 6],
          4: [-9, -3, 3, 9],
        };

        const positions = rackPositions[rackCount] || [-3, 3];

        positions.forEach((x, index) => {
          createRack(x, `${roomName} - Rack ${index + 1}`);
        });

        updateStats();

        // RAYCASTER

        raycaster = new THREE.Raycaster();
        mouse = new THREE.Vector2();

        window.onclick = onMouseClick;
        window.addEventListener("mousemove", onMouseMove);

        loadingSpinner.style.display = "none";
        animate();

        document.getElementById("closeInfo").onclick = () => {
          infoPanel.style.display = "none";
          if (hoveredObject) {
            hoveredObject.material.emissive?.setHex(0x000000);
          }
        };
      }

      function createRack(x, name) {
        rackGroup = new THREE.Group();
        rackGroup.position.x = x;

        const edges = new THREE.EdgesGeometry(
          new THREE.BoxGeometry(2.5, 7, 2.2),
        );

        const lines = new THREE.LineSegments(
          edges,
          new THREE.LineBasicMaterial({
            color: 0x6ba3ff,
            linewidth: 2,
          }),
        );

        rackGroup.add(lines);

        let patchPanels = [];
        let servers = [];

        // PATCH PANELS

        for (let i = 0; i < 2; i++) {
          const panel = new THREE.Mesh(
            new THREE.BoxGeometry(2, 0.18, 1.8),
            new THREE.MeshStandardMaterial({
              color: 0x1a1a1a,
              metalness: 0.6,
              roughness: 0.4,
            }),
          );

          panel.position.y = 2.5 - i * 0.5;
          panel.castShadow = true;
          panel.receiveShadow = true;

          panel.userData = {
            type: "Patch Panel",
            name: `Patch Panel ${i + 1}`,
            ports: 48,
            usedPorts: Math.floor(Math.random() * 48),
            rack: name,
          };

          rackGroup.add(panel);
          patchPanels.push(panel);
          devices.push(panel);
        }

        // SERVERS

        for (let i = 0; i < 5; i++) {
          const server = new THREE.Mesh(
            new THREE.BoxGeometry(2, 0.35, 1.8),
            new THREE.MeshStandardMaterial({
              color: 0x9ca3af,
              metalness: 0.5,
              roughness: 0.3,
            }),
          );

          server.position.y = 1 - i * 0.6;
          server.castShadow = true;
          server.receiveShadow = true;

          const isOnline = Math.random() > 0.1;

          server.userData = {
            type: "Servidor",
            name: `Dell R720 #${i + 1}`,
            ip: `10.10.11.${20 + i}`,
            status: isOnline ? "Online" : "Offline",
            cpuUsage: Math.floor(Math.random() * 100),
            ramUsage: Math.floor(Math.random() * 100),
            rack: name,
          };

          const led = new THREE.Mesh(
            new THREE.BoxGeometry(0.08, 0.08, 0.05),
            new THREE.MeshBasicMaterial({
              color: isOnline ? 0x22c55e : 0xef4444,
            }),
          );

          led.position.set(0.8, 0, 0.93);
          server.add(led);

          rackGroup.add(server);
          servers.push(server);
          devices.push(server);
        }

        // SWITCH

        const sw = new THREE.Mesh(
          new THREE.BoxGeometry(2, 0.22, 1.8),
          new THREE.MeshStandardMaterial({
            color: 0x2563eb,
            metalness: 0.6,
            roughness: 0.2,
          }),
        );

        sw.position.y = -2.5;
        sw.castShadow = true;
        sw.receiveShadow = true;

        sw.userData = {
          type: "Switch",
          name: "Core Switch",
          ip: "10.10.11.1",
          ports: 24,
          usedPorts: 12,
          rack: name,
          model: "Cisco Catalyst 9200",
        };

        rackGroup.add(sw);
        devices.push(sw);

        scene.add(rackGroup);

        // CABLES

        patchPanels.forEach((panel, idx) => {
          const startPos = rackGroup.getWorldPosition(new THREE.Vector3());
          startPos.y += panel.position.y;
          startPos.z += panel.position.z + 1;

          const endPos = rackGroup.getWorldPosition(new THREE.Vector3());
          endPos.y += sw.position.y;
          endPos.z += sw.position.z + 1;

          const cableColor = 0xff6600 + idx * 0x001100;
          createCableTube(
            startPos,
            endPos,
            cableColor,
            `Uplink ${idx + 1}`,
          );
        });

        servers.forEach((server, serverIdx) => {
          const patchPanelIdx = Math.floor(serverIdx / 3);
          const panel = patchPanels[Math.min(patchPanelIdx, patchPanels.length - 1)];

          if (panel) {
            const startPos = rackGroup.getWorldPosition(new THREE.Vector3());
            startPos.y += server.position.y;
            startPos.z += server.position.z - 1;

            const endPos = rackGroup.getWorldPosition(new THREE.Vector3());
            endPos.y += panel.position.y;
            endPos.z += panel.position.z - 1;

            const cableColors = [0x00ff00, 0x0099ff, 0xffff00, 0xff00ff];
            const cableColor = cableColors[serverIdx % cableColors.length];

            createCableTube(
              startPos,
              endPos,
              cableColor,
              `Server Link ${serverIdx + 1}`,
            );
          }
        });

        if (rackGroup.position.x === -3) {
          const localStartPos = new THREE.Vector3(-3, 0, 1);
          const localEndPos = new THREE.Vector3(3, 0, 1);

          createCableTube(
            localStartPos,
            localEndPos,
            0xff0000,
            "Cross-Connect",
          );
        }
      }

      function onMouseClick(event) {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);

        const intersects = raycaster.intersectObjects(scene.children, true);

        if (intersects.length > 0) {
          const obj = intersects[0].object;

          if (obj.userData.name) {
            infoPanel.style.display = "block";

            let additionalInfo = "";

            if (obj.userData.type === "Servidor") {
              additionalInfo = `
                <div class="infoSection">
                  <div class="infoLabel">CPU Usage</div>
                  <div class="infoValue">${obj.userData.cpuUsage}%</div>
                </div>
                <div class="infoSection">
                  <div class="infoLabel">RAM Usage</div>
                  <div class="infoValue">${obj.userData.ramUsage}%</div>
                </div>
              `;
            } else if (obj.userData.type === "Switch") {
              additionalInfo = `
                <div class="infoSection">
                  <div class="infoLabel">Model</div>
                  <div class="infoValue">${obj.userData.model}</div>
                </div>
                <div class="infoSection">
                  <div class="infoLabel">Ports Used</div>
                  <div class="infoValue">${obj.userData.usedPorts}/${obj.userData.ports}</div>
                </div>
              `;
            } else if (obj.userData.type === "Patch Panel") {
              additionalInfo = `
                <div class="infoSection">
                  <div class="infoLabel">Used Ports</div>
                  <div class="infoValue">${obj.userData.usedPorts}/${obj.userData.ports}</div>
                </div>
              `;
            } else if (obj.userData.type === "Cable") {
              additionalInfo = `
                <div class="infoSection">
                  <div class="infoLabel">Cable Color</div>
                  <div class="infoValue">${obj.userData.color}</div>
                </div>
              `;
            }

            const statusClass = obj.userData.status === "Online" ? "online" : "offline";

            infoPanel.innerHTML = `
              <button id="closeInfo">✕</button>

              <div class="infoTitle">${obj.userData.name}</div>

              <div class="infoSection">
                <div class="infoLabel">Device Type</div>
                <div class="infoValue">${obj.userData.type}</div>
              </div>

              ${
                obj.userData.rack
                  ? `
                <div class="infoSection">
                  <div class="infoLabel">Rack Location</div>
                  <div class="infoValue">${obj.userData.rack}</div>
                </div>
              `
                  : ""
              }

              ${
                obj.userData.ip
                  ? `
                <div class="infoSection">
                  <div class="infoLabel">IP Address</div>
                  <div class="infoValue">${obj.userData.ip}</div>
                </div>
              `
                  : ""
              }

              ${
                obj.userData.status
                  ? `
                <div class="infoSection">
                  <div class="infoLabel">Status</div>
                  <div class="infoValue">
                    <span class="statusIndicator ${statusClass}"></span>
                    ${obj.userData.status}
                  </div>
                </div>
              `
                  : ""
              }

              ${additionalInfo}

              ${
                obj.userData.type !== "Cable"
                  ? `
                <div class="infoSection">
                  <div class="infoLabel">Network Role</div>
                  <div>
                    <span class="badge ${obj.userData.type === "Switch" ? "core" : "access"}">
                      ${obj.userData.type === "Switch" ? "CORE" : "ACCESS"}
                    </span>
                  </div>
                </div>
              `
                  : ""
              }
            `;

            document.getElementById("closeInfo").onclick = () => {
              infoPanel.style.display = "none";
              if (hoveredObject) {
                hoveredObject.material.emissive?.setHex(0x000000);
              }
            };
          }
        }
      }

      function onMouseMove(event) {
        mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
        mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

        raycaster.setFromCamera(mouse, camera);

        const intersects = raycaster.intersectObjects(scene.children, true);

        if (hoveredObject) {
          hoveredObject.material.emissive?.setHex(0x000000);
          hoveredObject = null;
          document.body.style.cursor = "default";
        }

        if (intersects.length > 0) {
          const obj = intersects[0].object;

          if (obj.userData.name) {
            hoveredObject = obj;
            document.body.style.cursor = "pointer";

            if (obj.material.emissive) {
              obj.material.emissive.setHex(0x3b82f6);
            }
          }
        }
      }

      function animate() {
        requestAnimationFrame(animate);

        controls.update();

        renderer.render(scene, camera);
      }

      window.addEventListener("resize", () => {
        if (!camera || !renderer) return;

        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();

        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // ==================== INICIALIZAR ====================
      
      // Cargar datos al abrir la página
      window.addEventListener('DOMContentLoaded', () => {
        console.log('🚀 Iniciando aplicación...');
        loadBuildingData();
      });

    </script>
  </body>
</html>
