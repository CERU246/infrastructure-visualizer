<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Infraestructura IT 3D - Data Center Visualizer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Loading Spinner -->
    <div id="loadingSpinner">
        <div class="spinner"></div>
    </div>

    <!-- Floor Menu -->
    <div id="floorMenu"></div>

    <!-- Door Scene -->
    <div id="doorScene">
        <button id="backButton" onclick="goBack()">← Volver</button>
        <div id="titleBar"></div>
        <div id="hintBox">
            🖱️ Click en las puertas para acceder a las salas
        </div>
        <div id="doorsContainer"></div>
    </div>

    <!-- Rack View -->
    <div id="rackView">
        <button id="rackBackButton">← Volver</button>

        <div id="cableToggle">
            <button class="cableButton active" onclick="toggleCables(true)">
                🔌 Con Cables
            </button>
            <button class="cableButton" onclick="toggleCables(false)">
                ⚡ Sin Cables
            </button>
        </div>

        <div id="viewToggle">
            <button class="viewButton active" onclick="setViewMode('orbit')">
                🎯 Órbita
            </button>
            <button class="viewButton" onclick="setViewMode('front')">
                📐 Frontal
            </button>
            <button class="viewButton" onclick="setViewMode('side')">
                ↔️ Lateral
            </button>
        </div>

        <div id="stats"></div>
    </div>

    <!-- Info Panel Container -->
    <div id="infoPanelContainer">
        <button id="closeInfoBtn" class="close-btn">✕</button>
        <div id="deviceInfo"></div>
    </div>

    <!-- Tooltip -->
    <div id="tooltip" class="tooltip"></div>

    <!-- Three.js Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <!-- Main Script -->
    <script src="script.js"></script>
</body>
</html>
